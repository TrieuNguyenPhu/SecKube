apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredowner
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    metadata.gatekeeper.sh/title: "Required owner label"
    metadata.gatekeeper.sh/version: 1.0.0
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredOwner
      validation:
        openAPIV3Schema:
          type: object
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8srequiredowner

      violation[{"msg": msg}] {
        labels := object.get(input.review.object.metadata, "labels", {})
        owner := object.get(labels, "owner", "")
        owner == ""
        msg := sprintf("%v %v must set metadata.labels.owner", [input.review.kind.kind, input.review.object.metadata.name])
      }
