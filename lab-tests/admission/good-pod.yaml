# ==============================================================================
# File: good-pod.yaml
# Mục đích: Kiểm thử Pod tuân thủ TẤT CẢ các chính sách Gatekeeper
# Kết quả mong đợi: ĐƯỢC CHẤP NHẬN (ACCEPTED) bởi Admission Controller
#
# Pod này tuân thủ đầy đủ tất cả các chính sách bảo mật:
#   ✅ disallow-hostnetwork  → Không sử dụng hostNetwork
#   ✅ disallow-latest-tag   → Image ghim phiên bản cụ thể (nginx:1.27.3)
#   ✅ require-resource-limits → Có khai báo cpu & memory limits
#   ✅ disallow-runasuser-root → Chạy non-root (UID 10001)
#
# Đây là ví dụ mẫu (golden example) cho cách viết Pod đúng chuẩn bảo mật.
# Dùng file này làm tham chiếu khi tạo Pod mới trong dự án.
#
# Cách kiểm thử:
#   kubectl apply -f good-pod.yaml
#   → Gatekeeper sẽ cho phép tạo Pod thành công
# ==============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: good-policy-pod
  namespace: demo
spec:
  securityContext:
    # runAsNonRoot: true → kernel sẽ từ chối khởi chạy container nếu UID = 0 (root)
    # Đây là lớp bảo vệ ở cấp Linux kernel, bổ sung cho chính sách Gatekeeper
    runAsNonRoot: true
    # runAsUser: 10001 → UID không phải root, tuân thủ chính sách disallow-runasuser-root
    runAsUser: 10001
    # runAsGroup: 10001 → GID không phải root, giảm quyền truy cập file hệ thống
    runAsGroup: 10001
  containers:
  - name: nginx
    # Image ghim phiên bản cụ thể 1.27.3 → tuân thủ chính sách disallow-latest-tag
    # Đảm bảo triển khai có tính tái lặp và dễ dàng rollback khi cần
    image: nginx:1.27.3
    resources:
      # Khai báo limits đầy đủ → tuân thủ chính sách require-resource-limits
      limits:
        cpu: 100m       # 100 milliCPU = 0.1 CPU core
        memory: 64Mi    # 64 Mebibytes RAM
