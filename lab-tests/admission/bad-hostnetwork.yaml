apiVersion: v1
kind: Pod
metadata:
  name: bad-hostnetwork
  namespace: demo
spec:
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
  containers:
  - name: nginx
    image: nginx:1.27.3
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
