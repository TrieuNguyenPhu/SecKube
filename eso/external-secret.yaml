# =============================================================================
# File: eso/external-secret.yaml
# Mô tả: ExternalSecret - đồng bộ secret từ AWS Secrets Manager vào Kubernetes.
#
# Mục đích:
#   - Khai báo secret nào cần lấy từ AWS Secrets Manager.
#   - External Secrets Operator (ESO) sẽ tự động:
#     1. Đọc secret "demo/db" từ AWS Secrets Manager
#     2. Tạo Kubernetes Secret "db-secret" trong namespace demo
#     3. Cập nhật lại mỗi 30 giây để đảm bảo đồng bộ
#
# Luồng hoạt động:
#   AWS Secrets Manager ("demo/db")
#     → ESO đọc qua SecretStore "aws-store"
#       → Tạo K8s Secret "db-secret" trong namespace demo
#         → Pod/Deployment tham chiếu secret này để lấy thông tin DB
#
# Lưu ý: File này yêu cầu SecretStore "aws-store" phải tồn tại trước.
#         Xem file secret-store.yaml để biết cấu hình kết nối AWS.
# =============================================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-creds
  # Triển khai trong namespace demo - nơi ứng dụng chạy và cần secret
  namespace: demo
spec:
  # Tần suất đồng bộ: ESO sẽ kiểm tra AWS Secrets Manager mỗi 30 giây
  # Nếu secret trên AWS thay đổi, K8s Secret sẽ được cập nhật tự động
  refreshInterval: 30s

  # --- Tham chiếu đến SecretStore ---
  # SecretStore chứa cấu hình kết nối đến AWS Secrets Manager
  # (thông tin xác thực, region, v.v.)
  secretStoreRef:
    name: aws-store
    # "SecretStore" là loại scoped theo namespace (khác với ClusterSecretStore)
    kind: SecretStore

  # --- Cấu hình K8s Secret đích ---
  target:
    # Tên Kubernetes Secret sẽ được tạo ra
    # Các Pod có thể mount secret này qua tên "db-secret"
    name: db-secret
    # creationPolicy: Owner → ESO sở hữu và quản lý vòng đời Secret này
    # Nếu ExternalSecret bị xóa, Secret "db-secret" cũng sẽ bị xóa theo
    creationPolicy: Owner

  # --- Nguồn dữ liệu từ AWS ---
  dataFrom:
  - extract:
      # Key trên AWS Secrets Manager chứa thông tin database
      # "extract" sẽ lấy TẤT CẢ các cặp key-value trong secret này
      # Ví dụ: nếu AWS secret chứa {"username":"admin","password":"abc123"}
      # thì K8s Secret sẽ có 2 key: username và password
      key: demo/db
