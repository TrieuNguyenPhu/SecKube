# =============================================================================
# File: eso/secret-store.yaml
# Mô tả: SecretStore - cấu hình kết nối đến AWS Secrets Manager.
#
# Mục đích:
#   - Định nghĩa CÁCH kết nối đến AWS Secrets Manager (provider, region,
#     thông tin xác thực).
#   - ExternalSecret sẽ tham chiếu SecretStore này để biết cách truy cập AWS.
#   - Tách biệt cấu hình kết nối (SecretStore) khỏi khai báo secret
#     (ExternalSecret) giúp dễ quản lý và tái sử dụng.
#
# Luồng xác thực:
#   K8s Secret "aws-creds" (chứa access-key & secret-key)
#     → SecretStore "aws-store" (đọc credentials từ K8s Secret)
#       → Kết nối đến AWS Secrets Manager (region: ap-southeast-1)
#
# Điều kiện tiên quyết:
#   - K8s Secret "aws-creds" phải tồn tại trong namespace demo
#   - Secret này phải chứa 2 key: "access-key" và "secret-key"
#   - Tạo bằng lệnh: kubectl create secret generic aws-creds \
#       --from-literal=access-key=AKIA... \
#       --from-literal=secret-key=wJal... \
#       -n demo
# =============================================================================

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-store
  # Scoped theo namespace demo - chỉ ExternalSecret trong namespace demo
  # mới có thể sử dụng SecretStore này
  namespace: demo
spec:
  provider:
    # --- Cấu hình AWS Provider ---
    aws:
      # Sử dụng dịch vụ AWS Secrets Manager (không phải SSM Parameter Store)
      service: SecretsManager
      # Region Singapore - nơi lưu trữ secrets trên AWS
      region: ap-southeast-1

      # --- Xác thực bằng Access Key ---
      # Thay vì hardcode credentials, tham chiếu đến K8s Secret "aws-creds"
      # Đây là phương pháp an toàn hơn vì credentials được quản lý riêng
      auth:
        secretRef:
          # Access Key ID của IAM User có quyền đọc Secrets Manager
          accessKeyIDSecretRef:
            name: aws-creds       # Tên K8s Secret chứa credentials
            key: access-key       # Key trong Secret chứa Access Key ID
          # Secret Access Key tương ứng
          secretAccessKeySecretRef:
            name: aws-creds       # Cùng K8s Secret
            key: secret-key       # Key trong Secret chứa Secret Access Key
