# Lab 5: app-of-apps root
# Root App: App of Apps pattern - quản lý tất cả child applications
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TrieuNguyenPhu/SecKube.git
    path: argocd/apps
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - RespectIgnoreDifferences=true
  ignoreDifferences:
  - group: argoproj.io
    kind: Application
    name: gatekeeper
    namespace: argocd
    jsonPointers:
    - /spec/ignoreDifferences
