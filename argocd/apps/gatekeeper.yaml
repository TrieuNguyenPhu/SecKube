# =============================================================================
# FILE: gatekeeper.yaml
# MÔ TẢ: ArgoCD Application cài đặt OPA Gatekeeper từ Helm chart
# -----------------------------------------------------------------------------
# OPA Gatekeeper là admission controller dựa trên Open Policy Agent (OPA),
# cho phép định nghĩa và thực thi các policy bảo mật trên cluster Kubernetes.
# Gatekeeper sử dụng ConstraintTemplate (định nghĩa logic policy bằng Rego)
# và Constraint (áp dụng policy cho resource cụ thể).
#
# SYNC-WAVE: -2 (Hạ tầng - triển khai sớm nhất)
#   → Wave -2: Cài đặt Gatekeeper operator + CRD ← FILE NÀY
#   - Wave -1: Tạo namespace và cấu hình
#   - Wave  0: Triển khai ConstraintTemplates (gatekeeper-templates)
#   - Wave  1: Áp dụng Constraints (gatekeeper-constraints)
#   - Wave  2: Ứng dụng API (bị kiểm tra bởi constraints)
#
# Gatekeeper cần cài trước (wave -2) vì:
#   1. Cung cấp CRD ConstraintTemplate cho wave 0
#   2. Cung cấp admission webhook để enforce policy cho wave 1+
#
# IGNORE DIFFERENCES:
#   Gatekeeper tự động thay đổi annotations/labels/spec trên CRD và tự động
#   cập nhật caBundle trên webhook config. Nếu không ignore, ArgoCD sẽ thấy
#   "OutOfSync" liên tục và cố gắng revert, gây vòng lặp vô hạn.
#
# PHỤ THUỘC: Không phụ thuộc app nào khác
# ĐƯỢC PHỤ THUỘC BỞI:
#   - gatekeeper-templates (wave 0) - dùng CRD ConstraintTemplate
#   - gatekeeper-constraints (wave 1) - dùng CRD Constraint
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  namespace: argocd
  annotations:
    # sync-wave: -2 → cài đặt đầu tiên cùng ESO và policy-controller
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    # Helm chart chính thức của OPA Gatekeeper
    repoURL: https://open-policy-agent.github.io/gatekeeper/charts
    chart: gatekeeper
    targetRevision: 3.18.2
  destination:
    server: https://kubernetes.default.svc
    # Gatekeeper chạy trong namespace riêng "gatekeeper-system"
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    # CreateNamespace=true: Tự động tạo namespace "gatekeeper-system"
    - CreateNamespace=true
    # ServerSideApply=true: Cần thiết vì CRD của Gatekeeper rất lớn,
    # Client-Side Apply có thể gặp lỗi annotation quá dài
    - ServerSideApply=true

  # -----------------------------------------------------------------------
  # ignoreDifferences: Bỏ qua sự khác biệt do Gatekeeper tự động thay đổi
  # Nếu không có phần này, ArgoCD sẽ báo OutOfSync liên tục
  # -----------------------------------------------------------------------
  ignoreDifferences:
  # [1] CRD: Gatekeeper controller tự động thêm/sửa annotations, labels,
  # và spec trên CRD sau khi cài đặt. Đây là hành vi bình thường.
  # Dùng jqPathExpressions để match linh hoạt hơn jsonPointers
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    jqPathExpressions:
    - .metadata.annotations
    - .metadata.labels
    - .spec

  # [2] ValidatingWebhookConfiguration: Kubernetes tự động inject caBundle
  # (chứng chỉ CA) vào webhook config. Giá trị thay đổi mỗi lần cert được
  # rotate, nên cần ignore để tránh OutOfSync
  - group: admissionregistration.k8s.io
    kind: ValidatingWebhookConfiguration
    jsonPointers:
    - /webhooks/0/clientConfig/caBundle
    - /webhooks/1/clientConfig/caBundle
    - /webhooks/2/clientConfig/caBundle

  # [3] MutatingWebhookConfiguration: Tương tự ValidatingWebhook,
  # caBundle được inject tự động bởi Kubernetes
  - group: admissionregistration.k8s.io
    kind: MutatingWebhookConfiguration
    jsonPointers:
    - /webhooks/0/clientConfig/caBundle
    - /webhooks/1/clientConfig/caBundle
    - /webhooks/2/clientConfig/caBundle
